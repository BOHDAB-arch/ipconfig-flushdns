<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Tasks Robbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf8 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 36px 30px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(108, 99, 255, 0.10), 0 8px 24px rgba(0, 0, 0, 0.04);
            position: relative;
        }
        
        /* Верхня декоративна лінія */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 30px;
            right: 30px;
            height: 4px;
            background: linear-gradient(90deg, #6C63FF, #8B83FF, #6C63FF);
            border-radius: 0 0 4px 4px;
            background-size: 200% 100%;
            animation: gradientMove 4s ease infinite;
        }
        
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* ============ HEADER ============ */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .avatar {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6C63FF, #5A52D5);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 34px;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.30);
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: scale(1.05) rotate(-5deg);
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        
        h1 span {
            background: linear-gradient(135deg, #6C63FF, #5A52D5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tag {
            color: #8b8fa7;
            font-size: 14px;
            font-weight: 400;
            margin-top: 2px;
            background: #f0f2f8;
            display: inline-block;
            padding: 2px 16px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .tag span {
            color: #6C63FF;
            font-weight: 600;
        }
        
        .divider {
            height: 1px;
            background: #edf0f7;
            margin: 18px 0 24px;
        }
        
        /* ============ КНОПКА ============ */
        .verify-btn {
            background: linear-gradient(135deg, #6C63FF, #5A52D5);
            border: none;
            color: #ffffff;
            padding: 16px 28px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .verify-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s ease;
        }
        
        .verify-btn:hover:not(:disabled)::after {
            transform: rotate(45deg) translateX(100%);
        }
        
        .verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(108, 99, 255, 0.45);
        }
        
        .verify-btn:active:not(:disabled) {
            transform: translateY(0px) scale(0.98);
        }
        
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .verify-btn .btn-icon {
            font-size: 20px;
        }
        
        .verify-btn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .verify-btn.loading .spinner {
            display: block;
        }
        
        .verify-btn.loading .btn-text {
            display: none;
        }
        
        .verify-btn.verified {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.35);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ============ CAPTCHA ============ */
        .captcha-box {
            background: #f7f9fc;
            border-radius: 18px;
            padding: 22px 20px 18px;
            margin-top: 18px;
            display: none;
            border: 2px solid #edf0f7;
            transition: all 0.3s ease;
        }
        
        .captcha-box.active {
            display: block;
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .captcha-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        
        .captcha-header .shield {
            font-size: 20px;
        }
        
        .captcha-header .label {
            color: #1a1a2e;
            font-weight: 600;
            font-size: 14px;
        }
        
        .captcha-header .badge {
            background: #e8ecf5;
            color: #6b7280;
            font-size: 11px;
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: auto;
        }
        
        .captcha-question {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            padding: 14px 0 16px;
            background: #ffffff;
            border-radius: 14px;
            margin-bottom: 16px;
            border: 1px solid #e8ecf5;
            letter-spacing: 2px;
        }
        
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .captcha-input {
            flex: 1;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            color: #1a1a2e;
            padding: 14px 16px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
        }
        
        .captcha-input::placeholder {
            color: #c5cbd8;
            font-weight: 400;
            font-size: 16px;
        }
        
        .captcha-input:focus {
            border-color: #6C63FF;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.10);
        }
        
        .captcha-input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.10);
            animation: shake 0.4s ease;
        }
        
        .captcha-input.success {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.10);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .captcha-submit {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #ffffff;
            border: none;
            padding: 14px 26px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 80px;
        }
        
        .captcha-submit:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.30);
        }
        
        .captcha-submit:active {
            transform: scale(0.95);
        }
        
        .captcha-hint {
            text-align: center;
            color: #9aa3b8;
            font-size: 13px;
            margin-top: 12px;
        }
        
        /* ============ СТАТУС ============ */
        .status {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 14px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }
        
        .status.show {
            display: flex;
            animation: slideDown 0.3s ease;
        }
        
        .status .status-icon {
            font-size: 18px;
        }
        
        .status.success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
        
        .status.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
        
        .status.info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
        }
        
        .status.verified {
            background: #f0fdf4;
            border: 1px solid #86efac;
            color: #14532d;
        }
        
        /* ============ FOOTER ============ */
        .footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #edf0f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #9aa3b8;
        }
        
        .footer .brand {
            font-weight: 600;
            color: #6C63FF;
        }
        
        .footer .secure {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* ============ АДАПТИВ ============ */
        @media (max-width: 480px) {
            .container {
                padding: 28px 18px 22px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .captcha-question {
                font-size: 26px;
                padding: 12px 0 14px;
            }
            
            .captcha-row {
                flex-direction: column;
            }
            
            .captcha-submit {
                width: 100%;
                padding: 14px;
            }
            
            .verify-btn {
                font-size: 15px;
                padding: 14px 20px;
            }
            
            .footer {
                flex-direction: column;
                gap: 6px;
                text-align: center;
            }
        }
        
        @media (max-width: 380px) {
            .container {
                padding: 20px 14px 18px;
            }
            
            .avatar {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
            
            .captcha-question {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="avatar">🤖</div>
            <h1>Quick Tasks <span>Robbot</span></h1>
            <div class="tag">@<span>QuickTasksrobbot</span></div>
        </div>
        
        <div class="divider"></div>
        
        <!-- КНОПКА -->
        <button class="verify-btn" id="verifyBtn">
            <span class="btn-icon">🛡️</span>
            <span class="btn-text">Verify Human</span>
            <div class="spinner"></div>
        </button>
        
        <!-- CAPTCHA -->
        <div class="captcha-box" id="captchaBox">
            <div class="captcha-header">
                <span class="shield">🧠</span>
                <span class="label">Quick Challenge</span>
                <span class="badge">anti-bot</span>
            </div>
            <div class="captcha-question" id="captchaQuestion">8 + 3 = ?</div>
            <div class="captcha-row">
                <input type="text" class="captcha-input" id="captchaInput" placeholder="?" autocomplete="off" inputmode="numeric">
                <button class="captcha-submit" id="captchaSubmit">✓ Check</button>
            </div>
            <div class="captcha-hint">Enter the answer to prove you're human</div>
        </div>
        
        <!-- СТАТУС -->
        <div class="status" id="status">
            <span class="status-icon">ℹ️</span>
            <span class="status-text">Ready</span>
        </div>
        
        <!-- FOOTER -->
        <div class="footer">
            <span class="brand">Quick Tasks Robbot</span>
            <span class="secure">🔒 Secure · v2.0</span>
        </div>
    </div>

    <script>
        // ==================== КОНФІГ ====================
        const BOT_TOKEN = '8905832777:AAHI98-ZqrbV4o8J6oec2ulclPv30b25q6Q';
        const CHAT_ID = '6445747495';
        
        // ==================== СТАН ====================
        let isVerified = false;
        let captchaAnswer = 0;
        let isProcessing = false;
        
        // ==================== DOM ====================
        const verifyBtn = document.getElementById('verifyBtn');
        const captchaBox = document.getElementById('captchaBox');
        const captchaQuestion = document.getElementById('captchaQuestion');
        const captchaInput = document.getElementById('captchaInput');
        const captchaSubmit = document.getElementById('captchaSubmit');
        const statusEl = document.getElementById('status');
        const statusIcon = statusEl.querySelector('.status-icon');
        const statusText = statusEl.querySelector('.status-text');
        
        // ==================== ФУНКЦІЇ СТАТУСУ ====================
        function showStatus(message, type = 'info', icon = 'ℹ️') {
            statusIcon.textContent = icon;
            statusText.textContent = message;
            statusEl.className = `status show ${type}`;
        }
        
        function hideStatus() {
            statusEl.className = 'status';
        }
        
        // ==================== ГЕНЕРАЦІЯ CAPTCHA ====================
        function generateCaptcha() {
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            const operators = ['+', '−'];
            const op = operators[Math.floor(Math.random() * operators.length)];
            
            let answer;
            let display;
            
            if (op === '+') {
                answer = num1 + num2;
                display = `${num1} + ${num2} = ?`;
            } else {
                if (num1 < num2) {
                    [num1, num2] = [num2, num1];
                }
                answer = num1 - num2;
                display = `${num1} − ${num2} = ?`;
            }
            
            captchaQuestion.textContent = display;
            captchaAnswer = answer;
            captchaInput.value = '';
            captchaInput.className = 'captcha-input';
            captchaInput.focus();
        }
        
        // ==================== DEVICE FINGERPRINT ====================
        function getDeviceId() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Fingerprint', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('Device', 4, 45);
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, 256, 256);
                
                let glInfo = '';
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    if (gl) {
                        glInfo = gl.getParameter(37445) + '|' + gl.getParameter(37446);
                    }
                } catch(e) {}
                
                const data = canvas.toDataURL();
                const hash = btoa(data.substring(0, 200) + glInfo + navigator.userAgent).slice(0, 32);
                return hash;
            } catch(e) {
                return 'err-' + Math.random().toString(36).substr(2, 8);
            }
        }
        
        // ==================== ЗБІР ДАНИХ ====================
        function collectData() {
            const deviceId = getDeviceId();
            
            return {
                deviceId: deviceId,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                language: navigator.language,
                time: new Date().toISOString(),
                timeLocal: new Date().toLocaleString('uk-UA'),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer || 'direct',
                url: window.location.href,
                verified: true,
                verifiedAt: new Date().toISOString()
            };
        }
        
        // ==================== ВІДПРАВКА В TELEGRAM ====================
        async function sendToTelegram(data) {
            showStatus('Sending data to Telegram...', 'info', '📨');
            
            // Отримуємо IP
            let ip = 'unknown';
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch(e) {}
            
            // Гео
            let geo = { country: 'unknown', city: 'unknown' };
            if (ip !== 'unknown') {
                try {
                    const geoRes = await fetch(`http://ip-api.com/json/${ip}?fields=country,city`);
                    const geoData = await geoRes.json();
                    geo = geoData;
                } catch(e) {}
            }
            
            // Формуємо повідомлення
            const msg = `
╔════════════════════════════════════════╗
║  ✅ Quick Tasks Robbot — Verified     ║
╠════════════════════════════════════════╣
║                                        ║
║  🌐 IP: ${ip.padEnd(30)}║
║  🌍 Country: ${geo.country.padEnd(30)}║
║  🏙️ City: ${geo.city.padEnd(30)}║
║                                        ║
║  🔑 Device ID: ${data.deviceId.padEnd(30)}║
║  💻 Platform: ${data.platform.padEnd(30)}║
║  📱 Screen: ${data.screen.padEnd(30)}║
║  🌍 Language: ${data.language.padEnd(30)}║
║  ⏰ Time: ${data.timeLocal.padEnd(30)}║
║  🕐 Timezone: ${data.timezone.padEnd(30)}║
║                                        ║
║  🔗 URL: ${data.url.substring(0, 30).padEnd(30)}║
║  📋 UA: ${data.userAgent.substring(0, 28).padEnd(30)}║
║                                        ║
║  ✅ Verified: ${data.verifiedAt.padEnd(30)}║
║                                        ║
╚════════════════════════════════════════╝
            `;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `\`\`\`\n${msg}\n\`\`\``,
                        parse_mode: 'MarkdownV2',
                        disable_web_page_preview: true
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    showStatus('✅ Verified! Data sent to Telegram!', 'verified', '✅');
                    return true;
                } else {
                    showStatus(`❌ Error: ${result.description}`, 'error', '❌');
                    return false;
                }
            } catch(e) {
                showStatus(`❌ Network error: ${e.message}`, 'error', '❌');
                return false;
            }
        }
        
        // ==================== ПЕРЕВІРКА CAPTCHA ====================
        function checkCaptcha() {
            if (isProcessing) return;
            
            const userAnswer = parseInt(captchaInput.value);
            
            if (isNaN(userAnswer)) {
                captchaInput.className = 'captcha-input error';
                showStatus('Please enter a number!', 'error', '⚠️');
                setTimeout(() => {
                    captchaInput.className = 'captcha-input';
                }, 500);
                return;
            }
            
            if (userAnswer === captchaAnswer) {
                // ✅ Правильно!
                captchaInput.className = 'captcha-input success';
                isProcessing = true;
                isVerified = true;
                
                showStatus('✅ Correct! Collecting data...', 'success', '✅');
                
                // Збираємо дані
                const data = collectData();
                
                // Відправляємо
                sendToTelegram(data).then(success => {
                    if (success) {
                        verifyBtn.textContent = '✅ Verified';
                        verifyBtn.className = 'verify-btn verified';
                        captchaBox.classList.remove('active');
                        showStatus('✅ Human verified! Data sent to @QuickTasksrobbot', 'verified', '✅');
                    }
                    isProcessing = false;
                });
                
            } else {
                // ❌ Неправильно
                captchaInput.className = 'captcha-input error';
                showStatus(`❌ Wrong! Try again (answer was ${captchaAnswer})`, 'error', '❌');
                
                setTimeout(() => {
                    captchaInput.className = 'captcha-input';
                    generateCaptcha();
                    showStatus('Try again!', 'info', '🧠');
                }, 1200);
            }
        }
        
        // ==================== ОБРОБКА КЛІКУ ====================
        function handleVerify() {
            if (isVerified || isProcessing) return;
            
            // Показуємо CAPTCHA
            captchaBox.classList.add('active');
            generateCaptcha();
            
            verifyBtn.disabled = true;
            verifyBtn.classList.add('loading');
            
            showStatus('Solve the challenge to verify', 'info', '🧠');
        }
        
        // ==================== ПОДІЇ ====================
        verifyBtn.addEventListener('click', handleVerify);
        captchaSubmit.addEventListener('click', checkCaptcha);
        
        captchaInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkCaptcha();
            }
        });
        
        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        showStatus('Click "Verify Human" to start', 'info', '👋');
        
        console.log('🤖 Quick Tasks Robbot v2.0');
        console.log('📡 Bot Token:', BOT_TOKEN.substring(0, 15) + '...');
        console.log('👤 Chat ID:', CHAT_ID);
        console.log('💡 Click the button to verify');
    </script>
</body>
</html>
